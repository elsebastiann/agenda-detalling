{% extends "base.html" %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/main.min.css" rel="stylesheet">

<style>
  html, body { height: 100%; margin: 0; padding: 0; }

  /* ── Contenedor ── */
  #calendar-container {
    height: calc(100vh - 68px); /* desktop: navbar ~56px + pt-3 */
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
  }

  #calendar {
    height: 100% !important;
    width: 100%;
    background-color: #1a1a1a;
    border-radius: 10px;
    padding: 6px 10px 10px;
    overflow: visible !important;
    border: 1px solid #2a2a2a;
  }

  /* Eventos */
  .fc-event-title, .fc-event-main, .fc-event { color: #000 !important; }
  .fc-event { line-height: 1.25; border-radius: 5px !important; }

  /* Día actual — toque dorado sutil */
  .fc-timegrid-col.fc-day-today,
  .fc-daygrid-day.fc-day-today,
  .fc .fc-highlight,
  .fc .fc-day-today {
    background-color: rgba(212,180,108,0.06) !important;
  }

  /* Encabezados y horas */
  .fc .fc-col-header-cell-cushion {
    color: #555 !important; font-weight: 500 !important;
    text-decoration: none !important; font-size: 0.75rem !important;
  }
  .fc .fc-daygrid-day-number,
  .fc .fc-timegrid-axis-cushion {
    color: #444 !important; font-weight: 400 !important; font-size: 0.72rem !important;
  }
  /* Líneas de separación */
  .fc .fc-timegrid-slot { border-color: #222 !important; }
  .fc .fc-col-header { border-color: #2a2a2a !important; }

  /* ── Toolbar ── */
  .fc-header-toolbar {
    display: grid !important;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 4px;
    margin-bottom: 8px !important;
    padding: 0 2px;
  }
  .fc-toolbar-chunk:first-child { display: flex; gap: 2px; justify-content: flex-start; }
  .fc-toolbar-chunk:last-child  { display: flex; gap: 2px; justify-content: flex-end; }

  .fc-toolbar-title {
    font-size: 0.82rem; font-weight: 500;
    color: #d4b46c; text-align: center; line-height: 1.2;
  }

  .fc .fc-button {
    background: transparent !important; border: none !important;
    box-shadow: none !important; color: #444 !important;
    font-size: 0.7rem !important; font-weight: 500 !important;
    padding: 3px 8px !important; border-radius: 6px !important;
    line-height: 1.4 !important;
    transition: color 0.15s, background 0.15s !important;
    text-transform: uppercase; letter-spacing: 0.3px;
  }
  .fc .fc-button:hover, .fc .fc-button:focus {
    color: #d4b46c !important; background: rgba(212,180,108,0.06) !important;
    outline: none !important;
  }
  .fc .fc-button-active,
  .fc .fc-button-primary:not(:disabled).fc-button-active {
    color: #d4b46c !important; background: rgba(212,180,108,0.1) !important;
  }
  .fc .fc-icon { font-size: 0.85rem !important; }

  /* ── Móvil ── */
  @media (max-width: 991.98px) {
    /* logo-bar ~52px + bottom-nav 60px + pt-3 ~12px + algo de margen */
    #calendar-container { height: calc(100vh - 124px); }
    .fc-toolbar-title { font-size: 0.74rem; }
    .fc .fc-button { font-size: 0.65rem !important; padding: 2px 5px !important; }
  }
</style>
{% endblock %}

{% block content %}
<div id="calendar-container">
  <div id="calendar"></div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/locales-all.global.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var calendarEl = document.getElementById('calendar');

  var calendar = new FullCalendar.Calendar(calendarEl, {
    headerToolbar: {
      left: 'prev,next today',
      center: '',
      right: 'timeGridDay,timeGridWeek'
    },
    initialView: window.innerWidth < 768 ? 'timeGridDay' : 'timeGridWeek',
    locale: 'es',
    views: {
      timeGridDay: {
        buttonText: 'Día',
        slotEventOverlap: false
      },
      timeGridWeek: {
        buttonText: 'Semana',
        slotEventOverlap: true
      }
    },
    dayHeaderFormat: { weekday: 'short', day: 'numeric' },
    slotMinTime: '08:00:00',
    slotMaxTime: '19:00:00',
    nowIndicator: true,
    allDaySlot: false,
    expandRows: true,
    height: '100%',
    handleWindowResize: true,

    eventContent: function(info) {
      let container = document.createElement("div");
      container.style.whiteSpace = "pre-line";
      container.style.fontSize = "11px";
      container.style.color = "#000";
      container.style.padding = "4px 6px";
      container.style.fontWeight = "600";

      const estimated = info.event.extendedProps?.estimated_amount;

      let text = info.event.title;

      if (estimated !== undefined && estimated !== null) {
        const formatted = "$" + Number(estimated).toLocaleString("es-CO");
        text += "\n" + formatted;
      }

      container.textContent = text;
      return { domNodes: [container] };
    },

    eventClick: function(info) {
      let id = info.event.id;

      fetch(`/appointment/${id}/json`)
        .then(res => res.json())
        .then(data => {

          document.getElementById("modalBodyContent").innerHTML = `
  <p><b>Cliente:</b> ${data.customer_name}</p>
  <p><b>Placa:</b> ${data.plate || 'Sin placa'}</p>
  <p><b>Teléfono:</b> ${data.phone || 'No registrado'}</p>
  <p><b>Servicios:</b> ${data.services}</p>
  <p><b>Inicio:</b> ${data.start}</p>
  <p><b>Fin:</b> ${data.end}</p>
  <p><b>Notas:</b> ${data.notes || 'Sin notas'}</p>
  ${data.booking_adjustment_type ? `
  <p><b>Ajuste al agendar:</b>
    <span class="badge ${data.booking_adjustment_type === 'discount' ? 'bg-warning text-dark' : 'bg-info text-dark'}">
      ${data.booking_adjustment_type === 'discount' ? 'Descuento' : 'Recargo'}
      ${data.booking_adjustment_value}
      ${data.booking_adjustment_mode === 'percentage' ? '%' : '($' + Number(data.booking_adjustment_value).toLocaleString('es-CO') + ')'}
    </span>
  </p>` : ''}
  <p>
    <b>Valor estimado:</b>
    <span class="fw-semibold">
      $${Number(data.estimated_amount || 0).toLocaleString("es-CO")}
    </span>
  </p>
  <p>
    <b>Estado:</b>
    ${
      data.status === "completed"
        ? "<span class='badge bg-success'>Finalizado</span>"
        : data.status === "cancelled"
          ? "<span class='badge bg-danger'>Cancelado</span>"
          : "<span class='badge bg-secondary'>Agendado</span>"
    }
  </p>

  <div class="d-flex gap-2 mt-3 flex-wrap">

    ${
      data.status === "scheduled"
        ? `
          <a href="/appointment/${data.id}/edit"
             class="btn btn-outline-primary">
            Editar cita
          </a>

          <form method="POST"
                action="/appointments/${data.id}/delete"
                onsubmit="return confirm('¿Seguro que deseas eliminar esta cita?');">
            <button type="submit" class="btn btn-outline-danger">
              Eliminar cita
            </button>
          </form>
          `
        : `
          <button class="btn btn-outline-secondary" disabled>
            Editar cita
          </button>
          <button class="btn btn-outline-secondary" disabled>
            Eliminar cita
          </button>
          `
    }

    ${
      data.status === "scheduled"
        ? `
          <button class="btn btn-success"
                  onclick="openCloseService(${data.id})">
            Finalizar / Cancelar
          </button>
        `
        : `
          <button class="btn btn-secondary" disabled>
            Servicio ${data.status === "completed" ? "finalizado" : "cancelado"}
          </button>
        `
    }

  </div>

  <div id="closeServiceBox"
       class="mt-4"
       style="display:${data.status === "scheduled" ? "none" : "none"};">
  <hr>
  <h6>Cerrar servicio</h6>

  <div class="mb-2">
    <label class="form-label">Estado</label>
    <select id="closeStatus" class="form-select">
      <option value="completed">Finalizado</option>
      <option value="cancelled">Cancelado</option>
    </select>
  </div>

  <div class="mb-2" id="paymentMethodBox">
    <label class="form-label">Medio de pago</label>
    <input type="text"
           id="closePaymentMethod"
           class="form-control"
           placeholder="Ej: Efectivo, Transferencia">
  </div>

  <hr>

  <h6 class="mt-2">Ajuste manual (opcional)</h6>

  <div class="row g-2">
    <div class="col-md-4">
      <select id="adjustmentType" class="form-select">
        <option value="">Sin ajuste</option>
        <option value="discount">Descuento</option>
        <option value="surcharge">Recargo</option>
      </select>
    </div>

    <div class="col-md-4">
      <select id="adjustmentMode" class="form-select">
        <option value="fixed">Valor fijo</option>
        <option value="percentage">%</option>
      </select>
    </div>

    <div class="col-md-4">
      <input type="number"
             id="adjustmentValue"
             class="form-control"
             min="0"
             step="1"
             inputmode="numeric"
             placeholder="Valor">
    </div>
  </div>

  <div class="mb-2 mt-2">
    <label class="form-label">Motivo del ajuste</label>
    <textarea id="adjustmentReason"
              class="form-control"
              rows="2"
              placeholder="Obligatorio si hay ajuste"></textarea>
  </div>

  <div class="mb-2">
    <label class="form-label">Notas</label>
    <textarea id="closeNotes"
              class="form-control"
              rows="2"></textarea>
  </div>

  <button class="btn btn-success mt-2"
          onclick="submitCloseService(${data.id})">
    Confirmar cierre
  </button>
</div>
`;

          let modal = new bootstrap.Modal(document.getElementById("appointmentModal"));
          modal.show();

          // Resetear el closeServiceBox cada vez que se abre el modal
          document.getElementById("appointmentModal").addEventListener("hidden.bs.modal", function () {
            const box = document.getElementById("closeServiceBox");
            if (box) box.style.display = "none";
          }, { once: true });
        });
    },

    events: '/api/events',
    displayEventTime: false,
    eventColor: null,
});

  calendar.render();
});

function openCloseService(appointmentId) {
  const box = document.getElementById("closeServiceBox");
  if (!box) {
    alert("No se pudo abrir el formulario de cierre.");
    return;
  }
  box.style.display = "block";
}

function submitCloseService(appointmentId) {
  const currentStatus = document.getElementById("closeStatus").value;
  if (currentStatus !== "completed" && currentStatus !== "cancelled") {
    alert("Estado inválido.");
    return;
  }

  const status = currentStatus;
  const paymentMethod = document.getElementById("closePaymentMethod").value;

  const adjustmentType = document.getElementById("adjustmentType").value;
  const adjustmentMode = document.getElementById("adjustmentMode").value;
  const adjustmentValue = document.getElementById("adjustmentValue").value;
  const adjustmentReason = document.getElementById("adjustmentReason").value.trim();

  const notes = document.getElementById("closeNotes").value;

  if (status === "completed" && !paymentMethod) {
    alert("Debes indicar el medio de pago.");
    return;
  }

  if (adjustmentType && (!adjustmentValue || !adjustmentReason)) {
    alert("Si aplicas un ajuste, debes indicar valor y motivo.");
    return;
  }

  fetch(`/appointments/${appointmentId}/close`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      status: status,
      payment_method: paymentMethod,
      adjustment_type: adjustmentType,
      adjustment_mode: adjustmentMode,
      adjustment_value: adjustmentValue,
      adjustment_reason: adjustmentReason,
      notes: notes
    })
  })
  .then(res => res.json())
  .then(data => {
    if (!data.ok) {
      alert(data.error || "Error al cerrar el servicio");
      return;
    }
    location.reload();
  });
}
</script>
{% endblock %}
