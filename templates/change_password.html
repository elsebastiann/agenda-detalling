<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Cambiar contraseña — Agenda Detailing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1814">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg:        #1a1814;
      --surface:   #252118;
      --border:    #3a332a;
      --text:      #f0ead8;
      --text2:     #9e9282;
      --text3:     #6b5f52;
      --accent:    #d4b46c;
      --accent-dk: #c4a050;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; min-height: 100vh;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 38px 34px 32px;
      width: 100%; max-width: 400px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .card-title {
      font-size: 1.05rem; font-weight: 700;
      color: var(--text); margin-bottom: 6px;
    }
    .card-subtitle {
      font-size: 0.78rem; color: var(--text3); margin-bottom: 26px;
    }
    .forced-banner {
      background: rgba(212,180,108,0.12);
      border: 1px solid rgba(212,180,108,0.35);
      color: var(--accent);
      border-radius: 8px;
      font-size: 0.82rem;
      padding: 10px 13px;
      margin-bottom: 20px;
    }
    label {
      display: block; font-size: 0.72rem; font-weight: 600;
      color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.3px; margin-bottom: 5px;
    }
    input[type="password"] {
      width: 100%; background: var(--bg);
      border: 1.5px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 0.9rem;
      padding: 10px 13px; outline: none;
      transition: border-color 0.15s; margin-bottom: 14px;
    }
    input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,180,108,0.15);
    }
    input::placeholder { color: var(--text3); }
    .btn-save {
      width: 100%; background: var(--accent); color: #1a1814;
      border: none; border-radius: 8px; font-size: 0.88rem;
      font-weight: 700; padding: 11px; cursor: pointer;
      transition: background 0.15s; margin-top: 4px;
    }
    .btn-save:hover { background: var(--accent-dk); }
    .btn-cancel {
      display: block; text-align: center; margin-top: 12px;
      font-size: 0.78rem; color: var(--text3);
      text-decoration: none;
    }
    .btn-cancel:hover { color: var(--text2); }
    .error-msg {
      background: rgba(192,57,43,0.15);
      border: 1px solid rgba(192,57,43,0.35);
      color: #e07060; border-radius: 8px;
      font-size: 0.82rem; padding: 9px 13px;
      margin-bottom: 16px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-title">Cambiar contraseña</div>
    <div class="card-subtitle">Usuario: <strong style="color:var(--text);">{{ current_user.username }}</strong></div>

    {% if forced %}
    <div class="forced-banner">
      Debes establecer una nueva contraseña antes de continuar.
    </div>
    {% endif %}

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('change_password') }}">
      <label for="current_password">Contraseña actual</label>
      <input type="password" id="current_password" name="current_password"
             placeholder="••••••••" required autofocus>

      <label for="new_password">Nueva contraseña</label>
      <input type="password" id="new_password" name="new_password"
             placeholder="Mínimo 6 caracteres" required>

      <label for="confirm_password">Confirmar nueva contraseña</label>
      <input type="password" id="confirm_password" name="confirm_password"
             placeholder="Repite la nueva contraseña" required>

      <button type="submit" class="btn-save">Guardar contraseña</button>
    </form>

    {% if not forced %}
    <a href="{{ url_for('calendar_view') }}" class="btn-cancel">Cancelar</a>
    {% endif %}
  </div>
</body>
</html>
