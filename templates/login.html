<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Iniciar sesión — Agenda Detailing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#1a1814">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --bg:        #1a1814;
      --surface:   #252118;
      --border:    #3a332a;
      --text:      #f0ead8;
      --text2:     #9e9282;
      --text3:     #6b5f52;
      --accent:    #d4b46c;
      --accent-dk: #c4a050;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 36px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .login-logo {
      display: block;
      margin: 0 auto 24px;
      height: 48px;
      width: auto;
    }
    .login-title {
      text-align: center;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .login-subtitle {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text3);
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 5px;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.9rem;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(212,180,108,0.15);
    }
    input::placeholder { color: var(--text3); }
    .btn-login {
      width: 100%;
      background: var(--accent);
      color: #1a1814;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      padding: 11px;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 4px;
    }
    .btn-login:hover { background: var(--accent-dk); }
    .error-msg {
      background: rgba(192,57,43,0.15);
      border: 1px solid rgba(192,57,43,0.35);
      color: #e07060;
      border-radius: 8px;
      font-size: 0.82rem;
      padding: 9px 13px;
      margin-bottom: 18px;
      text-align: center;
    }
    .footer-text {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text3);
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <img src="/static/img/logotipo.png" alt="Agenda Detailing" class="login-logo"
         onerror="this.style.display='none'">
    <div class="login-title">Agenda Detailing</div>
    <div class="login-subtitle">Inicia sesión para continuar</div>

    {% if error %}
      <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <input type="hidden" name="next" value="{{ next }}">

      <label for="username">Usuario</label>
      <input type="text" id="username" name="username"
             placeholder="Nombre de usuario"
             autocomplete="username"
             autofocus required>

      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password"
             placeholder="••••••••"
             autocomplete="current-password"
             required>

      <button type="submit" class="btn-login">Entrar</button>
    </form>

    <div class="footer-text">Noxadetail &copy; {{ 2026 }}</div>
  </div>
</body>
</html>
